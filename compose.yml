services:
  punchcard:
    container_name: punchcard
    build: .
    ports:
      - 8080:8080
    environment:
      - PUNCHCARD_API_KEY=${PUNCHCARD_API_KEY:-dev}
      - DASHBOARD_USER=${DASHBOARD_USER:-admin}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-admin}
    volumes:
      - punchcard-data:/data

volumes:
  punchcard-data:
